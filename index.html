<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <title>Smart Apiary</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fff9e6; /* Мягкий, светлый медовый фон */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #4a3728; /* Темно-коричневый (цвет воска/дерева) */
        }
     .logo-img {
            max-width: 280px;
            height: auto;
            margin-bottom: 24px;
            border-radius: 16px;
            /* Легке світіння для темної теми */
            box-shadow: 0 10px 30px rgba(245, 158, 11, 0.05); 
        }
        
        h1 {
            margin-bottom: 40px;
        }
        .lang-container {
            display: flex;
            gap: 20px;
        }
        a {
            padding: 15px 30px;
            font-size: 18px;
            text-decoration: none;
            background-color: #ffc107; /* Яркий янтарный цвет */
            color: #3e2723; /* Темно-коричневый текст */
            font-weight: bold;
            border-radius: 50px; /* Скругленные кнопки */
            border: 2px solid #ff8f00;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        a:hover {
            background-color: #ff8f00; /* Более темный медовый при наведении */
            transform: scale(1.05);
            box-shadow: 0 6px 8px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <img src="assets/logo.png" alt="Smart Apiary Logo" class="logo-img">
    <p>Please select your language:</p>

    <div class="lang-container">
        <a href="docs/en/standard/index.html">English</a>
        <a href="docs/ua/standard/index.html">Українська</a>
    </div>

</body>
</html>
